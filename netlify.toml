[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Vite lives in devDependencies — ensure it’s installed on Netlify (avoid omit-dev).
[build.environment]
  NODE_VERSION = "20"
  NPM_CONFIG_PRODUCTION = "false"

# Avoid stale app shell / SW so reload always reconciles HTML ↔ hashed JS.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache"

[functions]
  node_bundler = "esbuild"

[dev]
  envFiles = [".env"]
