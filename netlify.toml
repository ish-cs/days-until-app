[build]
  publish = "dist"
  functions = "netlify/functions"

# Avoid stale app shell / SW so reload always reconciles HTML ↔ hashed JS.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache"

[functions]
  node_bundler = "esbuild"

[dev]
  envFiles = [".env"]
[build.environment]
  NODE_VERSION = "20"
